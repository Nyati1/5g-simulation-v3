apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: 5g-simulation-deployments
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchExpressions:
                - {key: akuity.io/argo-cd-cluster-name, operator: NotIn, values: [in-cluster]}
          - list:
              elements:
              - env: dev
                project: default
              - env: staging
                project: default
              - env: prod
                project: production

  template:
    metadata:
      name: 'core-1-{{env}}'
      annotations:
        kargo.akuity.io/authorized-stage: 5g-network-simulation:{{env}}
    spec:
      project: '{{project}}'
      source:
        repoURL: https://github.com/Nyati1/5g-simulation-v3.git
        targetRevision: main
        path: 'env/{{env}}'
      destination:
        name: '{{name}}'
        namespace: '5g-core-1-{{env}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true