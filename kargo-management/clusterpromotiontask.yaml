apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: git-update
  namespace: 5g-network-simulation
spec:
  steps:
    - uses: git-clone
    - uses: kustomize-set-image
    - uses: git-commit-push
---
apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: argocd-update
  namespace: 5g-network-simulation
spec:
  steps:
    - uses: argocd-sync