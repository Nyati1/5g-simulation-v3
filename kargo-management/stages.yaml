apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: 5g-network-simulation
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: 5g-sim-warehouse
    sources:
      direct: true

  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: https://github.com/Nyati1/5g-simulation-v3.git

      steps:
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitRepo }}
          checkout:
          - branch: main
            path: ./src
            

      - uses: kustomize-build
        config:
          path: ./src/env/dev
          outPath: ./src/env/dev/manifests.yaml

      - uses: git-commit
        as: commit
        config:
          path: ./src
          message: Promote dev config staging

      - uses: git-push
        config:
          path: ./src
          targetBranch: main
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: staging
  namespace: 5g-network-simulation
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: 5g-sim-warehouse
    sources:
      stages: [dev]
  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: https://github.com/Nyati1/5g-simulation-v3.git
      steps:
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitRepo }}
          checkout:
          - branch: main
            path: ./src
          - branch: env/staging
            create: true
            path: ./out
      - uses: git-clear
        config:
          path: ./out
      - uses: copy
        config:
          inPath: ./src/env/dev/kustomization.yaml
          outPath: ./src/env/staging/kustomization.yaml

      - uses: kustomize-build
        config:
          path: ./src/env/staging
          outPath: ./out/manifests.yaml
      - uses: git-commit
        as: commit
        config:
          path: ./out
          message: Promote dev config to staging
      - uses: git-push
        config:
          path: ./out
          targetBranch: env/staging
    
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod
  namespace: 5g-network-simulation
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: 5g-sim-warehouse
    sources:
      stages: [staging]
    promotionTemplate:
  spec:
    vars:
    - name: gitRepo
      value: https://github.com/Nyati1/5g-simulation-v3.git
    - name: prBranch
      value: promote-prod-$(date +%s)
    steps:
    - uses: git-clone
      config:
        repoURL: ${{ vars.gitRepo }}
        checkout:
        - branch: main
          path: ./src
        - branch: ${{ vars.prBranch }}
          create: true
          path: ./out
    - uses: git-clear
      config:
        path: ./out
    - uses: copy
      config:
        inPath: ./src/env/dev/kustomization.yaml
        outPath: ./src/env/staging/kustomization.yaml
    - uses: kustomize-build
      config:
        path: ./src/env/prod
        outPath: ./out/manifests.yaml
    - uses: git-commit
      config:
        path: ./out
        message: Promote staging config to prod
    - uses: git-push
      config:
        path: ./out
        targetBranch: ${{ vars.prBranch }}
        create: true
    - uses: git-create-pull-request
      config:
        repoURL: ${{ vars.gitRepo }}
        sourceBranch: ${{ vars.prBranch }}
        targetBranch: env/prod
        title: Promote prod config change
        body: Automated promotion from staging  
