---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: 5g-network-simulation
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: 5g-sim-warehouse
  promotionTemplate:
    spec:
      steps:
      - uses: git-clone
        config:
          repoURL: https://github.com/Nyati1/5g-simulation-v3.git
          checkoutBranch: main
          credentials:
            name: github-git-creds

      - uses: kustomize-set-imagegit 
          repoURL: https://github.com/Nyati1/5g-simulation-v3.git
          checkoutBranch: main
          credentials:
            name: github-git-creds

      - uses: kustomize-set-image
        config:
          images:
          - image: docker.io/gradiant/open5gs
            path: env/staging

      - uses: git-commit-push
        config:
          outBranch: env/staging

      - uses: argocd-update
        config:
          apps:
          - name: 5g-sim-staging
            namespace: argocd

---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod
  namespace: 5g-network-simulation
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: 5g-sim-warehouse
      sources:
        stages: [staging]
  promotionTemplate:
    spec:
      steps:
      - uses: git-clone
        config:
          repoURL: https://github.com/Nyati1/5g-simulation-v3.git
          checkoutBranch: main
          credentials:
            name: github-git-creds

      - uses: kustomize-set-image
        config:
          images:
          - image: docker.io/gradiant/open5gs
            path: env/prod

      - uses: git-commit-push
        config:
          outBranch: env/prod

      - uses: argocd-update
        config:
          apps:
          - name: 5g-sim-prod
            namespace: argocd