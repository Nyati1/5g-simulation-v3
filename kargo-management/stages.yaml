apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: 5g-network-simulation
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: 5g-sim-warehouse
    sources:
      direct: true

  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: https://github.com/Nyati1/5g-simulation-v3.git

      steps:
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitRepo }}
          checkout:
          - branch: main
            path: ./src
            

      - uses: kustomize-build
        config:
          path: ./src/env/dev
          outPath: ./src/env/dev/manifests.yaml

      - uses: git-commit
        as: commit
        config:
          path: ./src
          message: Promote dev config staging

      - uses: git-push
        config:
          path: ./src
          targetBranch: main
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: staging
  namespace: 5g-network-simulation
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: 5g-sim-warehouse
    sources:
      stages: [dev]
  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: https://github.com/Nyati1/5g-simulation-v3.git
      steps:
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitRepo }}
          checkout:
          - branch: main
            path: ./src
          - branch: env/staging
            create: true
            path: ./out
      - uses: git-clear
        config:
          path: ./out
      - uses: copy
        config:
          inPath: ./src/env/dev/kustomization.yaml
          outPath: ./src/env/staging/kustomization.yaml

      - uses: kustomize-build
        config:
          path: ./src/env/staging
          outPath: ./out/manifests.yaml
      - uses: git-commit
        as: commit
        config:
          path: ./out
          message: Promote dev config to staging
      - uses: git-push
        config:
          path: ./out
          targetBranch: env/staging
    
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod
  namespace: 5g-network-simulation
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: 5g-sim-warehouse
    sources:
      stages: [staging]
  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: https://github.com/Nyati1/5g-simulation-v3.git
      steps:
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitRepo }}
          checkout:
          - branch: main
            path: ./src
          # Use a dynamic branch name for the PR source
          - branch: env/prod-update-${{ commit }}
            create: true
            path: ./out
      - uses: git-clear
        config:
          path: ./out
      - uses: copy
        config:
          # Fixed logic: Copying from staging to prod manifests
          inPath: ./src/env/staging/kustomization.yaml
          outPath: ./out/kustomization.yaml
      - uses: kustomize-build
        config:
          path: ./src/env/prod
          outPath: ./out/manifests.yaml
      - uses: git-commit
        config:
          path: ./out
          message: "Promote staging config to prod: ${{ commit }}"
      - uses: git-push
        config:
          path: ./out
      - uses: git-create-pull-request
        config:
          repoURL: ${{ vars.gitRepo }}
          # The sourceBranch must match the checkout branch created above
          sourceBranch: env/prod-update-${{ commit }}
          targetBranch: env/prod
          title: "Promote prod config change: ${{ commit }}"
          body: |
            Automated promotion from staging.
            Freight: ${{ freight.id }}
