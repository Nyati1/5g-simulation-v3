apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: 5g-network-simulation
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: 5g-sim-warehouse
    sources:
      direct: true

  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: https://github.com/Nyati1/5g-simulation-v3.git

      steps:
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitRepo }}
          checkout:
          - branch: main
            path: ./src

      - uses: kustomize-build
        config:
          path: ./src/env/dev
          outPath: ./src/env/dev/manifests.yaml

      - uses: git-commit
        as: commit
        config:
          path: ./src
          message: Promote dev config change

      - uses: git-push
        config:
          path: ./src
          targetBranch: main



