apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: kargo-projects # Updated to match your Kargo project namespace
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: 5g-sim-warehouse
    sources:
      direct: true
  promotionTemplate:
    spec:
      steps:
      - uses: git-update
        config:
          repoURL: https://github.com/Nyati1/5g-simulation-v3.git
          checkoutBranch: main
          outBranch: main
          kustomize:
            images:
            - image: docker.io/gradiant/open5gs:2.7.0
              path: env/dev # Corrected path
      - uses: argocd-update
        config:
          apps:
          - name: core-1-dev # Updated to match image_dc4815.png
            namespace: argocd
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: staging
  namespace: kargo-projects
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: 5g-sim-warehouse
    sources:
      stages: [dev]
  promotionTemplate:
    spec:
      steps:
      - uses: git-update
        config:
          repoURL: https://github.com/Nyati1/5g-simulation-v3.git
          checkoutBranch: main
          outBranch: main
          kustomize:
            images:
            - image: docker.io/gradiant/open5gs:2.7.0
              path: env/staging
      - uses: argocd-update
        config:
          apps:
          - name: core-1-staging # Updated to match image_dc4815.png
            namespace: argocd
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod
  namespace: kargo-projects
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: 5g-sim-warehouse
    sources:
      stages: [staging]
  promotionTemplate:
    spec:
      steps:
      - uses: git-update
        config:
          repoURL: https://github.com/Nyati1/5g-simulation-v3.git
          checkoutBranch: main
          outBranch: main
          kustomize:
            images:
            - image: docker.io/gradiant/open5gs:2.7.0
              path: env/prod
      - uses: argocd-update
        config:
          apps:
          - name: core-1-prod # Updated to match image_dc4815.png
            namespace: argocd
