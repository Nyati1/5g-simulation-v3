apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: 5g-network-simulation
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: 5g-sim-warehouse
    sources:
      direct: true
  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: https://github.com/Nyati1/5g-simulation-v3.git
      steps:
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitRepo }}
          checkout:
          - branch: main
            path: ./src
      - uses: git-commit
        as: commit
        config:
          path: ./src
          message: Promote dev config change
      - uses: git-push
        config:
          path: ./src
          targetBranch: main
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: staging
  namespace: 5g-network-simulation
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: 5g-sim-warehouse
    sources:
      stages: [dev]
  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: https://github.com/Nyati1/5g-simulation-v3.git
      steps:
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitRepo }}
          checkout:
          - branch: main
            path: ./src
      - uses: copy
        config:
          inPath: ./src/env/dev/kustomization.yaml
          outPath: ./src/env/staging/kustomization.yaml
      - uses: git-commit
        as: commit
        config:
          path: ./src
          message: Promote dev config to staging
      - uses: git-push
        config:
          path: ./src
          targetBranch: main
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod
  namespace: 5g-network-simulation
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: 5g-sim-warehouse
    sources:
      stages: [staging]
  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: https://github.com/Nyati1/5g-simulation-v3.git
      steps:
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitRepo }}
          checkout:
          - branch: main
            path: ./src
      - uses: copy
        config:
          inPath: ./src/env/staging/kustomization.yaml
          outPath: ./src/env/prod/kustomization.yaml
      - uses: git-commit
        as: commit
        config:
          path: ./src
          message: Promote staging config to prod
      - uses: git-push
        config:
          path: ./src
          targetBranch: main