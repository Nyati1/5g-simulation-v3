---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: staging
  namespace: 5g-network-simulation
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: 5g-sim-warehouse
    sources:
      stages: [dev]
  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: https://github.com/Nyati1/5g-simulation-v3.git
      steps:
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitRepo }}
          checkout:
          - branch: main
            path: ./src
          - branch: env/staging
            create: true
            path: ./out
      - uses: git-clear
        config:
          path: ./out
      - uses: kustomize-build
        config:
          path: ./src/env/staging
          outPath: ./out/manifests.yaml
      - uses: git-commit
        as: commit
        config:
          path: ./out
          message: Promote staging config change
      - uses: git-push
        config:
          path: ./out
          targetBranch: env/staging
      # - uses: argocd-update
      #   config:
      #     apps:
      #     - name: core-1-staging
      #       sources:
      #       - repoURL: ${{ vars.gitRepo }}
      #         desiredRevision: ${{ outputs.commit.commit }}
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod
  namespace: 5g-network-simulation
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: 5g-sim-warehouse
    sources:
      stages: [staging]
  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: https://github.com/Nyati1/5g-simulation-v3.git
      steps:
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitRepo }}
          checkout:
          - branch: main
            path: ./src
          - branch: env/prod
            create: true
            path: ./out
      - uses: git-clear
        config:
          path: ./out
      - uses: kustomize-build
        config:
          path: ./src/env/prod
          outPath: ./out/manifests.yaml
      - uses: git-commit
        as: commit
        config:
          path: ./out
          message: Promote prod config change
      - uses: git-push
        config:
          path: ./out
          targetBranch: env/prod
