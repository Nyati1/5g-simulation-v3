apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    argocd.argoproj.io/tracking-id: 5g-network-simulation:apps/Deployment:5g-lab/open5gs-amf
  name: open5gs-amf
  namespace: 5g-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: amf
  template:
    metadata:
      labels:
        app: amf
    spec:
      containers:
        - args:
            - open5gs-amfd
          image: docker.io/gradiant/open5gs:2.7.0
          name: amf
          ports:
            - containerPort: 38412
              name: ngap
              protocol: SCTP