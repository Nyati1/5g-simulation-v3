apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 5g-sim-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Nyati1/5g-simulation-v3.git
    targetRevision: HEAD
    path: env/dev  # Points to the dev overlay
  destination:
    server: https://kubernetes.default.svc
    namespace: 5g-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true